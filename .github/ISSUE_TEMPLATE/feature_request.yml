name: Feature Request
description: 为 Canor 提出新功能或改进建议
title: "[Feature]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## ✨ 功能描述

        请描述您希望添加的功能或改进。

  - type: textarea
    id: problem
    attributes:
      label: 解决的问题
      description: 这个功能解决了什么问题？
      placeholder: |
        我面临的问题是...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 解决方案
      description: 您期望如何解决这个问题？
      placeholder: |
        期望的解决方案是...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 您考虑过哪些替代方案？
      placeholder: |
        替代方案包括...
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 任何其他相关信息
      placeholder: |
        其他信息包括...
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      description: 功能优先级
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: 确认
      options:
        - label: 我已搜索过，确认不是重复请求
          required: true
        - label: 我愿意帮助实现这个功能
          required: false
