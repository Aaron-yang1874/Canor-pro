name: Bug Report
description: 创建 Bug 报告以帮助我们改进
title: "[Bug]: "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug 描述

        请简洁清晰地描述这个 Bug。

  - type: textarea
    id: description
    attributes:
      label: 复现步骤
      description: 详细说明如何复现这个 Bug
      placeholder: |
        1. 进入 '...'
        2. 点击 '....'
        3. 滚动到 '....'
        4. 出现错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 您期望发生什么？
      placeholder: 预期行为是...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 与预期行为有什么实际差异？
      placeholder: 实际行为是...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 版本
      description: Canor 版本
      placeholder: v2.0.0
    validations:
      required: true

  - type: dropdown
    id: browsers
    attributes:
      label: 浏览器
      description: 这个 Bug 在什么浏览器中发生？
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - 其他
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 请粘贴任何相关的错误日志
      placeholder: |
        Paste your logs here...
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: 屏幕截图
      description: 如果有相关截图，请粘贴
      placeholder: |
        Drag or drop screenshot here
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: 确认
      options:
        - label: 我已搜索过此问题，确认不是重复报告
          required: true
        - label: 我愿意在需要时提供更多信息
          required: false
